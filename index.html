<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RallyScore407</title>

<style>
body{
  margin:0;
  background:#0b1020;
  color:#fff;
  text-align:center;
}

/* スコア */
.score{
  font-size:20vw;
  font-weight:800;
}

/* ===== フォントモード ===== */
.font-din{
  font-family:"DIN Condensed","Arial Narrow",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}

.font-system{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

.font-digital{
  font-family:"Courier New",monospace;
}

.font-digital .score{
  letter-spacing:6px;
}
</style>
</head>

<body class="font-din">

<h2 id="modeLabel"></h2>

<div>
  <div id="nameA">A</div>
  <div id="scoreA" class="score">0</div>
</div>

<div>
  <div id="nameB">B</div>
  <div id="scoreB" class="score">0</div>
</div>

<hr>

<h3>Settings</h3>

<div>
  <label>Font Mode</label><br>
  <select id="fontSelect">
    <option value="din">DIN (Default)</option>
    <option value="system">System</option>
    <option value="digital">Digital</option>
  </select>
</div>

<script>
const state = {
  font: 'din'
};

/* ===== フォント適用 ===== */
function applyFont(){
  document.body.classList.remove('font-din','font-system','font-digital');
  document.body.classList.add('font-' + state.font);

  localStorage.setItem("fontMode", state.font);
}

/* ===== フォント初期化 ===== */
function initFont(){
  const saved = localStorage.getItem("fontMode");
  if(saved){
    state.font = saved;
  }
  document.getElementById("fontSelect").value = state.font;
  applyFont();
}

/* ===== フォント変更 ===== */
document.getElementById("fontSelect").addEventListener("change", e=>{
  state.font = e.target.value;
  applyFont();
});

/* ===== PairPlay連携判定 ===== */
function initMode(){
  const params = new URLSearchParams(location.search);

  if(params.has("teamA") && params.has("teamB")){
    document.getElementById("modeLabel").innerText = "PairPlay Linked Mode";

    document.getElementById("nameA").innerText = params.get("teamA");
    document.getElementById("nameB").innerText = params.get("teamB");

  }else{
    document.getElementById("modeLabel").innerText = "Standalone Mode";
  }
}

/* ===== 初期化 ===== */
initFont();
initMode();
</script>

</body>
</html>
